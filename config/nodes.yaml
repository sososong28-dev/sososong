nodes:
  - id: mac-openclaw-master
    name: Mac OpenClaw 主机
    os_type: mac
    host: localhost
    ip: 127.0.0.1
    openclaw_process_name: openclaw-gateway
    log_path: /Users/sososong/.openclaw/logs/openclaw.log
    openclaw_port: 18789
    health_commands:
      - "openclaw gateway status"
      - "openclaw status --all"
    task_commands:
      - "openclaw sessions list 2>&1 | head -30"
      - "openclaw status --all 2>&1 | head -50"

